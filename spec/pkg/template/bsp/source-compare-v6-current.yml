    renamed:
      bsps/sparc/leon3/include/bsp/gr740-bootstrap-regs.h: bsps/include/grlib/grgprbank-regs.h
      bsps/sparc/leon3/include/bsp/gr740-iopll-regs.h: bsps/include/grlib/grgpreg-regs.h
      bsps/sparc/leon3/include/bsp/gr740-thsens-regs.h: bsps/include/grlib/gr740thsens-regs.h
