    reviews:
      sparc-start-multitasking:
        subject: Fix multitasking start for SPARC
        text: |
          This change fixed a potential stack corruption in uniprocessor
          configurations during start multitasking.

          The system initialization uses the interrupt stack.  A first level
          interrupt shall never interrupt a context which uses the interrupt
          stack.  Such a use would lead to stack corruption and undefined system
          behaviour.  Unfortunately, in uniprocessor configurations this was the
          case.  Multiprocessing was started using ``_CPU_Context_restore()``.
          The caller of this function (``_Thread_Start_multitasking())`` uses the
          interrupt stack.  Later we have in
          :file:`cpukit/score/cpu/sparc/cpu_asm.S`:

          .. code-block:: none

              mov     %g1, %psr                     ! restore status register and
                                                    ! **** ENABLE TRAPS ****

              ld      [%o1 + G5_OFFSET], %g5        ! restore the global registers
              ld      [%o1 + G7_OFFSET], %g7

              ! Load thread specific ISR dispatch prevention flag
              ld      [%o1 + ISR_DISPATCH_DISABLE_STACK_OFFSET], %o2
              ! Store it to memory later to use the cycles

              ldd     [%o1 + L0_OFFSET], %l0        ! restore the local registers
              ldd     [%o1 + L2_OFFSET], %l2
              ldd     [%o1 + L4_OFFSET], %l4
              ldd     [%o1 + L6_OFFSET], %l6

              ! Now restore thread specific ISR dispatch prevention flag
              st      %o2, [%g6 + PER_CPU_ISR_DISPATCH_DISABLE]

              ldd     [%o1 + I0_OFFSET], %i0        ! restore the input registers
              ldd     [%o1 + I2_OFFSET], %i2
              ldd     [%o1 + I4_OFFSET], %i4
              ldd     [%o1 + I6_FP_OFFSET], %i6

              ldd     [%o1 + O6_SP_OFFSET], %o6     ! restore the output registers

          Between the *ENABLE TRAPS* and the restore of the output registers, we
          still use the stack of the caller and interrupts may be enabled.  If an
          interrupt happens in this code block, the interrupt stack is
          concurrently used which may lead to a crash.

          Fix this by adding a new function ``_SPARC_Start_multiprocessing()``
          for uniprocessor configurations.  This function first sets the stack
          pointer to use the stack of the heir thread.  See
          $${/pkg/issue/rtems/4955:/name}.
          This change was specifically implemented for QDP version 6.
      scheduler-uni:
        subject: Removal of PRIORITY_PSEUDO_ISR thread priority
        text: |
          For the uniprocessor schedulers, the special case logic for the
          PRIORITY_PSEUDO_ISR priority was removed.  See $${/pkg/issue/rtems/2365:/name}.
          This change was specifically implemented for QDP version 6.
      grlib:
        subject: GRLIB register blocks mainline integration and improvements
        text: |
          The register block specification was reviewed by the RTEMS Project.
          The register block header file generator was modified to address
          findings of the ISVV activity, see $${/pkg/issue/rtems/4842:/name}.  The GRLIB
          register block specification was updated to address review comments
          from Gaisler on the RTEMS development mailing list.
          This change was specifically implemented for QDP version 6.
      leon3-irq:
        subject: LEON3 interrupt controller support mainline integration
        text: |
          The pre-qualified LEON3 interrupt controller support was integrated in
          the RTEMS mainline.  As a result, review comments on the RTEMS mailing
          list were addressed.  Findings of the ISVV activity were addressed, see
          $${/pkg/issue/rtems/4850:/name}.
          This change was specifically implemented for QDP version 6.
      leon3-dsu:
        subject: Use of Debug Support Unit (DSU) for clock driver and CPU counter on GR712RC
        text: |
          The clock driver and CPU counter support was simplified.  For the
          GR712RC, the DSU time tag is now used by the clock driver and CPU
          counter, $${/pkg/issue/rtems/4954:/name}.
          This change was specifically implemented for QDP version 6.
      leon3-shutdown:
        subject: Simplify LEON3 BSP shutdown in SMP configurations
        text: |
          Busy wait loops and complicated shutdown procedures were removed.  This
          change was specifically implemented for QDP version 6.
      compiler-builtins:
        subject: Implementation of compiler builtins
        text: |
          See section *Use of Externally Provided Items* in
          $${/pkg/deployment/doc-package-manual:/cite}.  This change was
          specifically implemented for QDP version 6.
      clock-directives:
        subject: Function implementations of Clock Manager directives
        text: |
          Two function implementations of Clock Manager directives were missing.
          Validation tests were added accordingly.
          This change was specifically implemented for QDP version 6.
      task-storage:
        subject: Improved thread-local storage implementation
        text: |
          The thread-local storage support was refactored to better support the
          different implementation variants.  See $${/pkg/issue/rtems/3835:/name}
          This change was specifically implemented for QDP version 6.
      tls-idle:
        subject: Thread-local storage should be usable once an idle thread exists
        text: |
          See $${/pkg/issue/rtems/4672:/name}.  This change was specifically implemented
          for QDP version 6.
      reent-tls:
        subject: Usage of thread-local storage in Newlib
        text: |
          See $${/pkg/issue/rtems/4560:/name}.  This change was specifically implemented
          for QDP version 6.
      noinit-data:
        subject: Usage of .noinit data
        text: |
          Some statically allocated data structures are explicitly initialized
          during runtime.  These data structures do not need a zero
          initialization during system initialization.  They were placed into
          dedicated linker sections to avoid the superfluous zero initialization.
          This reduces the system initialization time.  This change was
          specifically implemented for QDP version 6.
      pthread-cancel:
        subject: Usage of PTHREAD_CANCELED for _Thread_Cancel()
        text: |
          The rtems_task_delete() directive is basically just a combined
          pthread_cancel() and pthread_join().  In addition, it removes the
          PTHREAD_DETACHED state.  The exit value returned by pthread_join() of
          threads cancelled by rtems_task_delete() should reflect this by getting
          a PTHREAD_CANCELED value instead of NULL which could be a normal exit
          value.  See $${/pkg/issue/rtems/4680:/name}.
          This change was specifically implemented for QDP version 6.
      thread-join:
        subject: Usage of priority inheritance for thread join
        text: |
          The thread cancel operation used a special case priority boosting
          mechanism implemented by _Thread_Raise_real_priority().  The problem
          was that this approach

          * is not transitive,

          * does not account for priority adjustments of the calling task
            while waiting for the join,

          * does not support clustered scheduling, and

          * does not detect deadlocks.

          All these problems were fixed by using a priority inheritance thread
          queue for the join operation.  See $${/pkg/issue/rtems/4678:/name}.
          This change was specifically implemented for QDP version 6.
      cpu-counter-diff:
        subject: Removal of _CPU_Counter_difference()
        text: |
          See $${/pkg/issue/rtems/3456:/name}.
          This change was specifically implemented for QDP version 6.
      scheduler-index:
        subject: Assert scheduler index validity
        text: |
          Findings of the ISVV activity were addressed, see
          $${/pkg/issue/rtems/4844:/name}.
          This change was specifically implemented for QDP version 6.
      rtems-build-name:
        subject: Fix typo in rtems_build_name() definition
        text: |
          This change was specifically implemented for QDP version 6.
      gcc-pr108658:
        subject: Workaround for GCC PR108658
        text: |
          This change was specifically implemented for QDP version 6.
      percpuasm:
        subject: Static assertions
        text: |
          The :file:`percpuasm.c` source file contains static assertions to
          verify CPU port properties.
          This change was specifically implemented for QDP version 6.
      explicit-smp-code:
        subject: Explicit code for SMP configurations
        text: |
          Conditional expressions with inline functions are not optimized away if
          optimization is disabled.  Avoid such expressions to prevent dead
          branches.  It helps also during code review to immediately see if a
          loop is used or not.
          This change was specifically implemented for QDP version 6.
      libtest:
        subject: Move of test support
        text: |
          Files used only by the test support were removed from the pre-qualified
          libraries.  This change was specifically implemented for QDP version 6.
      smp-only:
        subject: Move of SMP-only files
        text: |
          In uniprocessor configurations, files used only in SMP configurations
          were removed from the pre-qualified libraries.  This change was
          specifically implemented for QDP version 6.
      build-options-header:
        subject: Usage of build options
        text: |
          Header files using build options include now ``#include
          <rtems/score/cpuopts.h>`` explicitly.
          This change was specifically implemented for QDP version 6.
      doxygen:
        subject: Doxygen documentation improvements
        text: |
          Build system provided files were documented.  File documentation was
          added.  Conditional code was restructured to yield better Doxygen
          documentation (for example Doxygen does not stop processing a file if
          an ``#errror`` directive would abort the C preprocessing).
          Implementation parts were moved out of Doxygen group scopes.  Items
          were documented.  See also $${/pkg/issue/rtems/3707:/name}.
          This change was specifically implemented for QDP version 6.
      doxygen-appl-config:
        subject: Documentation update for application configuration options
        text: |
          The Doxygen documentation for application configuration options was
          regenerated from the specification.  See $${/pkg/issue/rtems/3994:/name}.
          This change was specifically implemented for QDP version 6.
      no-rtems-printer:
        subject: Removal of not pre-qualified header <rtems/printer.h>
        text: |
          This change was specifically implemented for QDP version 6.
      no-mainpage:
        subject: Removal of duplicate Doxygen main page
        text: |
          This change was specifically implemented for QDP version 6.
      alloconly:
        subject: Simplification of pre-qualified memory allocation support
        text: |
          Changes in the build system support for the pre-qualfied only build
          enabled a simplified memory allocation implementation.  This change was
          specifically implemented for QDP version 6.
      mark-arg-as-unused:
        subject: Unused arguments
        text: |
          Findings of the ISVV activity were addressed, see
          $${/pkg/issue/rtems/4862:/name}.
          This change was specifically implemented for QDP version 6.
      mpci-hide-impl:
        subject: Hide MPCI implementation details
        text: |
          This improves the standard compatibility of API headers.  It fixes
          errors like this if RTEMS_MULTIPROCESSING is enabled.
      irq-record:
        subject: Event recording support for interrupt service routines
        text: |
          Servicing interrupts is an important job of real-time applications.
          Event recording helps to analyze the dynamics of an application.
          Support for event recording of interrupt service routines was added.
      idle-task-storage:
        subject: Support for idle thread stack allocator
        text: |
          See $${/pkg/issue/rtems/3835:/name} and $${/pkg/issue/rtems/4524:/name}.
      absolute-symbols:
        subject: Removal of usage of absolute symbols
        text: |
          See $${/pkg/issue/rtems/4953:/name}.
      threadq-timeouts:
        subject: Use right clock for threadq timeouts
        text: |
          Clocks CLOCK_REALTIME and CLOCK_MONOTONIC are now used for relative
          thread queue timeouts instead of CLOCK_REALTIME_COARSE and
          CLOCK_MONOTONIC_COARSE.  This fixes an issue with clock_nanosleep() in
          combination with clock_gettime().  See $${/pkg/issue/rtems/4669:/name}.
      tls-libdl:
        subject: Thread-local storage support for libdl
        text: |
          See $${/pkg/issue/rtems/4920:/name}.
      hash-algorithms:
        subject: Synchronization of hash algorithms with FreeBSD
        text: |
          The implementation of hash algorithms was synchronized with FreeBSD to
          address Coverity Scan static analyzer findings.  See
          $${/pkg/issue/rtems/3719:/name}.
      ntp:
        subject: Support for NTP and PPS
        text: |
          Support for $${/glossary/ntp:/term} and $${/glossary/pps:/term} was
          added.  The PPS support was synchronized with FreeBSD.  For the
          pre-qualified feature set of RTEMS, the PPS support was disabled
          through the ``RTEMS_PPS_SYNC`` build option.  See
          $${/pkg/issue/rtems/2348:/name} and $${/pkg/issue/rtems/2349:/name}.
      clocknanosleep:
        subject: Fix for relative CLOCK_REALTIME sleep
        text: |
          A relative CLOCK_REALTIME time out shall not be affected by
          CLOCK_REALTIME changes through clock_settime().  Since our
          CLOCK_REALTIME is basically just CLOCK_MONOTONIC plus an offset, we can
          simply use the CLOCK_MONOTONIC watchdog for relative CLOCK_REALTIME
          time outs.
          See $${/pkg/issue/rtems/4690:/name}.
      thread-registers:
        subject: Move of Thread_Control::Registers member
        text: |
          See $${/pkg/issue/rtems/3835:/name}.
      deprecate-bsp-irq-api:
        subject: Deprecated BSP-specific interrupt API
        text: |
          The BSP-specific interrupt API was deprecated, see
          $${/pkg/issue/rtems/3269:/name}.
      bsp-fatal:
        subject: Fatal BSP error code changes
        text: |
          Fatal BSP error codes were added or removed.  These are
          implementation-specific interface changes.
      no-cpu-atomic:
        subject: Removal of CPU port specific atomic operations support
        text: |
          All CPU ports used the same implementation.
      dev-io:
        subject: Move of IO support functions
        text: |
          Some IO support functions were moved from ``#include
          <rtems/score/io.h>`` to ``#include <rtems/dev/io.h>``.
      jaffs2:
        subject: Configuration option for JAFFS2
        text: |
          See $${/pkg/issue/rtems/4961:/name}.
      face:
        subject: Configuration option for FACE Technical Standard
        text: |
          See $${/pkg/issue/rtems/4691:/name}.
      cxx-compatibility:
        subject: Improved C++ compatibility
        text: |
          See $${/pkg/issue/rtems/4706:/name}.
      warning-uninitialized:
        subject: Warning fixes involving uninitialized variables
        text: |
          See $${/pkg/issue/rtems/4662:/name}.
      warning-no-member:
        subject: Warning fixes involving structures with no members
        text: |
          See $${/pkg/issue/rtems/4662:/name}.
      warning-zero-length-array:
        subject: Warning fixes involving flexible array members
        text: |
          See $${/pkg/issue/rtems/4662:/name}.
      strict-c:
        subject: Use standard C
        text: |
          Some code blocks were changed to strictly follow the C standard.  See
          $${/pkg/issue/rtems/4662:/name}.
      unreachable:
        subject: Avoid cyclic header file dependency involving RTEMS_UNREACHABLE()
        text: |
          See $${/pkg/issue/rtems/4900:/name}.
      formatting:
        subject: Formatting improvements
        text: |
          The format of code blocks was changed for better readability or to be
          in line with the coding standard.
      unlimited-objects:
        subject: Fix for unlimited objects support
        text: |
          See $${/pkg/issue/rtems/4677:/name}.
      bitset-mask:
        subject: Fix _Processor_mask_To_uint32_t()
        text: |
          The ``_Processor_mask_To_uint32_t()`` function was changed to correctly
          calculate the array index and shift value.  The bugs had no impact yet
          since this function was always called with a zero value for the index
          in RTEMS.
      bitset-newlib:
        subject: Account for <sys/bitset.h> API changes
        text: |
          See $${/pkg/issue/rtems/4667:/name}.
      inline:
        subject: Removal of RTEMS_INLINE_ROUTINE
        text: |
          The textual replacement of ``RTEMS_INLINE_ROUTINE`` to ``static
          inline`` was done.  The use of standard C simplifies the Doxygen
          documentation generation and use of static analyzers.  See
          $${/pkg/issue/rtems/3935:/name}.
      unused-protected-heap:
        subject: Removal of unused protected heap functions
        text: |
          See $${/pkg/issue/rtems/4909:/name}.
      unused-includes:
        subject: Removal of unused header file includes
        text: |
          Some superfluous header file includes were removed.
