attribute-actions: []
attributes:
  content: |
    The package contains an example application.  Build it to check that the
    tools work on your host computer.

    $${.:/subprocess:args=make RTEMS_CPU=%(.:/component/arch) RTEMS_BSP=%(.:/component/bsp)%(.:/component/config:dash)%(.:/component/bsp-qual-only:dash) clean,cwd=%(/pkg/source/example:/directory),hide=1}
    $${.:/subprocess:args=make RTEMS_CPU=%(.:/component/arch) RTEMS_BSP=%(.:/component/bsp)%(.:/component/config:dash)%(.:/component/bsp-qual-only:dash),cwd=%(/pkg/source/example:/directory)}

    If you get a different output, then there is something wrong with the
    unpacked archive or your host computer setup.

    Try to run the example application
    :file:`b-$${.:/component/bsp}$${.:/component/config:dash}$${.:/component/bsp-qual-only:dash}/example.exe`
    on a simulator or a target platform.

    $${.:/subprocess:args=make RTEMS_CPU=%(.:/component/arch) RTEMS_BSP=%(.:/component/bsp)%(.:/component/config:dash)%(.:/component/bsp-qual-only:dash) run,cwd=%(/pkg/source/example:/directory)}

    If you get a different output, then there is something wrong with the
    unpacked archive or your host computer setup.
