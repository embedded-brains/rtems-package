actions:
- action: remove-tree
  enabled-by: true
  missing-ok: true
  path: ${.:/params/build-directory}
- action: mkdir
  enabled-by: true
  exist-ok: false
  parents: true
  path: ${.:/params/build-directory}
- action: subprocess
  command:
  - ${/pkg/source/pkg-config:/directory}/configure
  - --prefix=${.:/output/deployment/directory}
  - --disable-shared
  - ${.:/make-params/host}
  enabled-by: true
  env:
  - action: set
    name: CPPFLAGS
    value: '-DPKGCONFIG_IS_STATIC=1'
  - action: path-prepend
    name: PATH
    value: ${.:/component/deployment-directory}/bin
  expected-return-code: 0
  working-directory: ${.:/params/build-directory}
- action: subprocess
  command:
  - make
  - -j
  - ${.:/host-processor-count}
  enabled-by: true
  env:
  - action: path-prepend
    name: PATH
    value: ${.:/component/deployment-directory}/bin
  expected-return-code: 0
  working-directory: ${.:/params/build-directory}
- action: subprocess
  command:
  - make
  - -j
  - ${.:/host-processor-count}
  - install-strip
  - DESTDIR=${.:/params/build-directory}/destdir
  enabled-by: true
  env:
  - action: path-prepend
    name: PATH
    value: ${.:/component/deployment-directory}/bin
  expected-return-code: 0
  working-directory: ${.:/params/build-directory}
- action: directory-state-discard-and-clear
  enabled-by: true
  output-name: deployment
- action: directory-state-copy-file
  enabled-by: true
  output-name: deployment
  source: ${.:/params/build-directory}/destdir/${.:/output/deployment/directory}/bin/pkgconf${.:/make-params/exeext}
  target: bin/pkg-config${.:/make-params/exeext}
- action: remove-tree
  enabled-by: true
  missing-ok: true
  path: ${.:/params/build-directory}
copyrights:
- Copyright (C) 2024 embedded brains GmbH & Co. KG
enabled-by: true
links: []
params:
  build-directory: ${.:/component/build-directory}/build-pkg-config
pkg-type: run-actions
type: pkg
